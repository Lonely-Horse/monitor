global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - "/etc/prometheus/alert_rules.yml"
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
     - targets: ['localhost:9090']
  - job_name: 'aliyun-server'
    static_configs:
     - targets: ['100.98.1.105:9100']
  - job_name: 'My-blog'
    static_configs:
     - targets: ['My_blog:8000']  #tailscale的虚拟私人网络ip
