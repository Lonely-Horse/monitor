name: Edge Blog GitOps Deploy

# 只有当 main 分支有代码推送时才触发
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
      - name: Remote Deployment via Aliyun Jump Host
        uses: appleboy/ssh-action@master
        with:
          # 1. 登录阿里云服务器的配置（从你的 GitHub Secrets 读取）
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 设置连接超时时间
          timeout: 30s
          script: |
            echo "--- 已经成功登录阿里云服务器 ---"
            
            # 2. 在阿里云上通过 Tailscale SSH 到workstation执行部署命令
            # -i 指定你已有的那把钥匙
            # -o 禁用主机名检查（防止 CI 过程中因为没见过指纹而卡住）
            ssh -i ~/.ssh/git_workflow -o StrictHostKeyChecking=no lonelyhorse@100.87.250.21 << 'EOF'
              echo "--- 已经成功进入workstation节点 ---"
              
              # 进入项目目录
              cd /home/lonelyhorse/work/monitor
              
              # 拉取最新代码
              echo "正在从 GitHub 拉取最新代码..."
              git pull origin main
              
              #完成渲染
              cd ./alerting
              envsubst < alertmanager.yml.template > alertmanager.yml

              # 原地构建并重启容器
              # 注意：如果你的用户不在 docker 组，请保留 doas
              echo "正在重新构建并启动 Docker 容器..."
              sudo docker compose up -d --build
              
              # 清理无用镜像碎片，释放手机空间
              echo "清理过期镜像..."
              sudo docker image prune -f
              
              echo "--- 手机端部署任务全部完成！ ---"
            EOF
            
            echo "--- 整个流水线执行完毕 ---"
